# Đường dẫn kết nối đến Database PostgreSQL trong WSL
spring.datasource.url=jdbc:postgresql://localhost:5432/studynet_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Cấu hình Hibernate (JPA) tự động tạo bảng dựa trên code Java của bạn
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis-backed HTTP sessions, identified by the X-Auth-Token header
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.store-type=redis
